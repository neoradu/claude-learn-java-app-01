version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: expense-tracker-postgres
    environment:
      POSTGRES_DB: expenses_db
      POSTGRES_USER: expenses_user
      POSTGRES_PASSWORD: expenses_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses_user -d expenses_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
