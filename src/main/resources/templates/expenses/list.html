<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expenses</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments :: header}"></div>
    <div th:replace="~{fragments :: flash}"></div>

    <section class="card">
        <div class="row-between">
            <h1>Expenses</h1>
            <a class="btn-primary" th:href="@{/expenses/new}">New Expense</a>
        </div>

        <form method="get" th:action="@{/expenses}" class="form-grid">
            <label>Category
                <select name="categoryId">
                    <option value="">All categories</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${filter.categoryId != null and filter.categoryId == cat.id}">
                    </option>
                </select>
            </label>
            <label>From
                <input type="date" name="dateFrom" th:value="${filter.dateFrom}">
            </label>
            <label>To
                <input type="date" name="dateTo" th:value="${filter.dateTo}">
            </label>
            <label>Min amount
                <input type="number" name="minAmount" step="0.01" min="0" th:value="${filter.minAmount}">
            </label>
            <label>Max amount
                <input type="number" name="maxAmount" step="0.01" min="0" th:value="${filter.maxAmount}">
            </label>
            <div class="actions">
                <button type="submit">Filter</button>
                <a class="btn-muted" th:href="@{/expenses}">Clear</a>
            </div>
        </form>

        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${expenses.isEmpty()}">
                <td colspan="5">No expenses found.</td>
            </tr>
            <tr th:each="expense : ${expenses}">
                <td th:text="${expense.date}"></td>
                <td th:text="${expense.description}"></td>
                <td th:text="${expense.category.name}"></td>
                <td th:text="${expense.amount}"></td>
                <td class="actions-inline">
                    <a th:href="@{/expenses/{id}/edit(id=${expense.id})}">Edit</a>
                    <form th:action="@{/expenses/{id}/delete(id=${expense.id})}" method="post"
                          onsubmit="return confirm('Delete this expense?');">
                        <button type="submit" class="btn-link-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="actions" th:if="${expenses.totalPages > 1}">
            <a class="btn-muted"
               th:href="@{/expenses(page=${expenses.number - 1}, size=${expenses.size}, categoryId=${filter.categoryId}, dateFrom=${filter.dateFrom}, dateTo=${filter.dateTo}, minAmount=${filter.minAmount}, maxAmount=${filter.maxAmount})}"
               th:classappend="${expenses.first} ? 'disabled'"
               th:if="${!expenses.first}">Previous</a>
            <span th:text="'Page ' + (${expenses.number + 1}) + ' of ' + ${expenses.totalPages}"></span>
            <a class="btn-muted"
               th:href="@{/expenses(page=${expenses.number + 1}, size=${expenses.size}, categoryId=${filter.categoryId}, dateFrom=${filter.dateFrom}, dateTo=${filter.dateTo}, minAmount=${filter.minAmount}, maxAmount=${filter.maxAmount})}"
               th:if="${!expenses.last}">Next</a>
        </div>
    </section>
</div>
</body>
</html>
