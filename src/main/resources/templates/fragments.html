<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header">
    <nav class="main-nav">
        <a class="brand" th:href="@{/expenses}">Expense Tracker</a>
        <div class="nav-links">
            <a th:href="@{/expenses}">Expenses</a>
            <a th:href="@{/categories}">Categories</a>
        </div>
    </nav>
</header>

<section th:fragment="flash">
    <div class="flash success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="flash error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
</section>
</body>
</html>
