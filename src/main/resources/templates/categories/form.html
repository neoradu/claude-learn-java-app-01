<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isEdit} ? 'Edit Category' : 'New Category'">Category Form</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments :: header}"></div>
    <div th:replace="~{fragments :: flash}"></div>

    <section class="card">
        <h1 th:text="${isEdit} ? 'Edit Category' : 'New Category'"></h1>
        <form th:object="${categoryForm}"
              th:action="${isEdit} ? @{/categories/{id}(id=${categoryId})} : @{/categories}"
              method="post" class="form-grid">
            <label>Name
                <input type="text" th:field="*{name}" maxlength="100" required>
                <small class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </label>

            <label>Description
                <textarea th:field="*{description}" rows="3" maxlength="255"></textarea>
                <small class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
            </label>

            <div class="actions">
                <button type="submit" th:text="${isEdit} ? 'Update Category' : 'Create Category'"></button>
                <a class="btn-muted" th:href="@{/categories}">Cancel</a>
            </div>
        </form>
    </section>
</div>
</body>
</html>
