<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categories</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments :: header}"></div>
    <div th:replace="~{fragments :: flash}"></div>

    <section class="card">
        <div class="row-between">
            <h1>Categories</h1>
            <a class="btn-primary" th:href="@{/categories/new}">New Category</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(categories)}">
                <td colspan="3">No categories found.</td>
            </tr>
            <tr th:each="category : ${categories}">
                <td th:text="${category.name}"></td>
                <td th:text="${category.description}"></td>
                <td class="actions-inline">
                    <a th:href="@{/categories/{id}/edit(id=${category.id})}">Edit</a>
                    <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post"
                          onsubmit="return confirm('Delete this category?');">
                        <button type="submit" class="btn-link-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
